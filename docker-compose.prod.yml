# Production stack for Kawalec Command Center on kawalec-vps.
# Shared Caddy on the host (kawalec/caddy-geoip2) terminates TLS for
# *.kawalec.pl and reverse-proxies into the `proxy` external network.
# Our service alias in that network is `cc-app:3000`.
#
# First-time deploy:
#   cd /root/stacks
#   git clone https://github.com/dawidkawalec/om-kawalec.git command-center
#   cd command-center
#   cp .env.production.example .env && $EDITOR .env
#   docker compose -f docker-compose.prod.yml build --no-cache
#   docker compose -f docker-compose.prod.yml up -d
#   # Then add the vhost to /root/stacks/caddy/Caddyfile (see docs/deployment.md)
#
# Upgrade:
#   git pull
#   docker compose -f docker-compose.prod.yml build app
#   docker compose -f docker-compose.prod.yml up -d app

name: command-center

services:
  app:
    build:
      context: .
      args:
        - CONTAINER_PORT=3000
    container_name: cc-app
    user: "0"
    restart: unless-stopped
    command:
      - /bin/sh
      - -lc
      - |
        if [ ! -f /app/docker/scripts/init-or-migrate.sh ]; then
          echo "ERROR: init-or-migrate.sh not found. Rebuild: docker compose build --no-cache app"
          exit 1
        fi
        sh /app/docker/scripts/init-or-migrate.sh
        yarn start
    working_dir: /app
    volumes:
      - init_marker:/tmp/init-marker
      - attachments_storage:/app/storage
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      DEPLOY_ENV: ${DEPLOY_ENV:-production}
      PORT: 3000
      APP_URL: ${APP_URL:?APP_URL must be set, e.g. https://cc.kawalec.pl}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set}
      TENANT_DATA_ENCRYPTION: "true"
      TENANT_DATA_ENCRYPTION_KEY: ${TENANT_DATA_ENCRYPTION_KEY:?TENANT_DATA_ENCRYPTION_KEY must be set (32+ chars)}
      CACHE_STRATEGY: redis
      CACHE_REDIS_URL: redis://redis:6379
      ENABLE_CRUD_API_CACHE: "true"
      EVENTS_REDIS_URL: redis://redis:6379
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:?MEILISEARCH_API_KEY must be set}
      MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:?MEILISEARCH_MASTER_KEY must be set}
      OM_AI_PROVIDER: ${OM_AI_PROVIDER:-google}
      OM_AI_MODEL: ${OM_AI_MODEL:-google/gemini-2.5-flash}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL must be set}
      EMAIL_FROM: ${EMAIL_FROM:-}
      NOTIFICATIONS_EMAIL_FROM: ${NOTIFICATIONS_EMAIL_FROM:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      DEMO_MODE: "false"
      SELF_SERVICE_ONBOARDING_ENABLED: "false"
      # Run kawalec post-init seed after standard initialize. Idempotent.
      INIT_COMMAND: "yarn initialize && yarn mercato kawalec setup-crm"
      OM_INIT_SUPERADMIN_EMAIL: ${OM_INIT_SUPERADMIN_EMAIL:?OM_INIT_SUPERADMIN_EMAIL must be set}
      OM_INIT_SUPERADMIN_PASSWORD: ${OM_INIT_SUPERADMIN_PASSWORD:?OM_INIT_SUPERADMIN_PASSWORD must be set}
      AUTO_SPAWN_WORKERS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - default
      - proxy

  postgres:
    image: pgvector/pgvector:pg17-trixie
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-command_center}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - default

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  meilisearch:
    image: getmeili/meilisearch:v1.11
    restart: unless-stopped
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  init_marker:
  attachments_storage:

networks:
  default:
    driver: bridge
  proxy:
    external: true
